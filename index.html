<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reflexión DAFO</title>
  <meta name="description" content="Aplicación de reflexión DAFO con vídeos, preguntas, feedback y PDF final." />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg: #f7f7fb;
      --card: #ffffff;
      --text: #1d1d26;
      --muted: #66677a;
      --primary: #3858e9;
      --danger: #b42318;
      --ok: #067647;
      --border: #dedff0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 18px 56px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 12px 40px rgba(26, 26, 44, 0.08);
    }

    .hidden { display: none; }

    h1, h2, h3 { margin-top: 0; }

    .muted { color: var(--muted); }

    .progress {
      height: 10px;
      background: #e8e9f6;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: var(--primary);
      transition: width 0.25s ease;
    }

    iframe, video {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 0;
      border-radius: 18px;
      background: #000;
      margin: 14px 0 22px;
    }

    label {
      display: block;
      margin: 14px 0 8px;
      font-weight: 700;
    }

    textarea, input[type="text"] {
      width: 100%;
      min-height: 92px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      background: #fff;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      background: var(--primary);
      color: white;
    }

    button.secondary {
      background: #edefff;
      color: var(--primary);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .feedback {
      border-left: 5px solid var(--danger);
      background: #fff3f0;
      padding: 12px 14px;
      border-radius: 12px;
      margin-top: 16px;
    }

    .ok {
      border-left-color: var(--ok);
      background: #ecfdf3;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 12px;
      background: #edefff;
      color: var(--primary);
      font-weight: 700;
      margin-bottom: 12px;
    }

    .answer-list {
      display: grid;
      gap: 12px;
    }

    .answer-item {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      background: #fbfbff;
    }
  </style>
</head>
<body>
  <main>
    <section id="intro" class="card">
      <h1>Reflexión DAFO</h1>
      <p class="muted">Visualiza cada vídeo, responde a las preguntas y descarga al final un PDF personalizado con recomendaciones.</p>
      <div class="actions">
        <button id="startBtn">Comenzar</button>
      </div>
    </section>

    <section id="app" class="card hidden">
      <div class="progress" aria-label="Progreso">
        <div id="progressBar" class="progress-bar"></div>
      </div>

      <span id="typePill" class="pill"></span>
      <h2 id="sectionTitle"></h2>
      <div id="videoContainer"></div>

      <form id="questionForm">
        <h3 id="questionText"></h3>
        <label for="answerInput">Tu respuesta</label>
        <textarea id="answerInput" required placeholder="Escribe aquí tu reflexión..."></textarea>
        <div id="feedbackBox" class="feedback hidden"></div>
        <div class="actions">
          <button type="submit">Guardar respuesta</button>
          <button id="skipFeedbackBtn" class="secondary hidden" type="button">Continuar</button>
        </div>
      </form>
    </section>

    <section id="result" class="card hidden">
      <h2>Resumen final</h2>
      <p id="resultText" class="muted"></p>
      <div id="summaryVideoContainer"></div>
      <h3>Respuestas recogidas</h3>
      <div id="answersList" class="answer-list"></div>
      <div class="actions">
        <button id="downloadPdfBtn">Descargar PDF de recomendaciones</button>
        <button id="restartBtn" class="secondary">Reiniciar</button>
      </div>
    </section>
  </main>

  <script>
    const SECTION_ORDER = ["Debilidad", "Amenaza", "Fortaleza", "Oportunidad"];

    const SECTION_VIDEOS = {
      Debilidad: "videos/debilidad.mp4",
      Amenaza: "videos/amenaza.mp4",
      Fortaleza: "videos/fortaleza.mp4",
      Oportunidad: "videos/oportunidad.mp4"
    };

    const SUMMARY_VIDEOS = {
      refuerzo_debilidades: "videos/resumen-debilidades.mp4",
      refuerzo_amenazas: "videos/resumen-amenazas.mp4",
      potenciar_fortalezas: "videos/resumen-fortalezas.mp4",
      aprovechar_oportunidades: "videos/resumen-oportunidades.mp4",
      equilibrado: "videos/resumen-equilibrado.mp4"
    };

    let questions = [];
    let groupedQuestions = {};
    let sectionIndex = 0;
    let questionIndex = 0;
    let answers = [];
    let currentQuestion = null;

    const intro = document.querySelector("#intro");
    const app = document.querySelector("#app");
    const result = document.querySelector("#result");
    const startBtn = document.querySelector("#startBtn");
    const restartBtn = document.querySelector("#restartBtn");
    const questionForm = document.querySelector("#questionForm");
    const skipFeedbackBtn = document.querySelector("#skipFeedbackBtn");
    const downloadPdfBtn = document.querySelector("#downloadPdfBtn");

    startBtn.addEventListener("click", startApp);
    restartBtn.addEventListener("click", () => location.reload());
    questionForm.addEventListener("submit", handleAnswerSubmit);
    skipFeedbackBtn.addEventListener("click", goNext);
    downloadPdfBtn.addEventListener("click", generatePdf);

    async function startApp() {
      try {
        const response = await fetch("preguntas.json");
        if (!response.ok) throw new Error("No se pudo cargar preguntas.json");
        questions = await response.json();
        groupedQuestions = groupByType(questions);

        intro.classList.add("hidden");
        app.classList.remove("hidden");
        renderCurrentStep();
      } catch (error) {
        alert("Error cargando preguntas.json. Revisa que esté en la misma carpeta que index.html.");
        console.error(error);
      }
    }

    function groupByType(items) {
      return items.reduce((acc, item) => {
        const type = item.tipo;
        if (!acc[type]) acc[type] = [];
        acc[type].push(item);
        return acc;
      }, {});
    }

    function renderCurrentStep() {
      const type = SECTION_ORDER[sectionIndex];
      const sectionQuestions = groupedQuestions[type] || [];
      currentQuestion = sectionQuestions[questionIndex];

      if (!currentQuestion) {
        goNext();
        return;
      }

      document.querySelector("#typePill").textContent = type;
      document.querySelector("#sectionTitle").textContent = `Bloque ${sectionIndex + 1}: ${type}`;
      document.querySelector("#questionText").textContent = currentQuestion.pregunta;
      document.querySelector("#answerInput").value = "";
      document.querySelector("#feedbackBox").classList.add("hidden");
      skipFeedbackBtn.classList.add("hidden");

      renderVideo("#videoContainer", SECTION_VIDEOS[type]);
      updateProgress();
    }

    function renderVideo(selector, source) {
      const container = document.querySelector(selector);
      if (!source) {
        container.innerHTML = "";
        return;
      }

      if (source.includes("youtube.com") || source.includes("youtu.be") || source.includes("vimeo.com")) {
        container.innerHTML = `<iframe src="${source}" allowfullscreen title="Vídeo"></iframe>`;
      } else {
        container.innerHTML = `<video controls src="${source}"></video>`;
      }
    }

    function normalizeText(text) {
      return String(text || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9ñ\s]/g, "")
        .trim();
    }

    function isAnswerAdequate(userAnswer, adequateAnswer) {
      const user = normalizeText(userAnswer);
      const expected = normalizeText(adequateAnswer);

      if (!expected) return true;
      if (user.includes(expected)) return true;

      const expectedWords = expected.split(/\s+/).filter(word => word.length > 3);
      const matchedWords = expectedWords.filter(word => user.includes(word));
      return expectedWords.length > 0 && matchedWords.length / expectedWords.length >= 0.6;
    }

    function handleAnswerSubmit(event) {
      event.preventDefault();
      const answer = document.querySelector("#answerInput").value.trim();
      if (!answer) return;

      const adequate = isAnswerAdequate(answer, currentQuestion.respuesta_adecuada);
      const savedAnswer = {
        tipo: currentQuestion.tipo,
        pregunta: currentQuestion.pregunta,
        respuestaUsuario: answer,
        respuestaAdecuada: currentQuestion.respuesta_adecuada || "",
        correcta: adequate,
        feedback: adequate ? "Respuesta adecuada." : currentQuestion.feedback || "Revisa este apartado con más profundidad."
      };

      answers.push(savedAnswer);

      const feedbackBox = document.querySelector("#feedbackBox");
      feedbackBox.className = adequate ? "feedback ok" : "feedback";
      feedbackBox.textContent = savedAnswer.feedback;
      feedbackBox.classList.remove("hidden");
      skipFeedbackBtn.classList.remove("hidden");
    }

    function goNext() {
      questionIndex++;
      const type = SECTION_ORDER[sectionIndex];
      const sectionQuestions = groupedQuestions[type] || [];

      if (questionIndex >= sectionQuestions.length) {
        sectionIndex++;
        questionIndex = 0;
      }

      if (sectionIndex >= SECTION_ORDER.length) {
        showResult();
      } else {
        renderCurrentStep();
      }
    }

    function updateProgress() {
      const totalQuestions = SECTION_ORDER.reduce((sum, type) => sum + (groupedQuestions[type] || []).length, 0);
      const completed = answers.length;
      const percent = totalQuestions ? Math.round((completed / totalQuestions) * 100) : 0;
      document.querySelector("#progressBar").style.width = `${percent}%`;
    }

    function chooseSummaryVideoKey() {
      const failuresByType = SECTION_ORDER.reduce((acc, type) => {
        acc[type] = answers.filter(answer => answer.tipo === type && !answer.correcta).length;
        return acc;
      }, {});

      const maxFailures = Math.max(...Object.values(failuresByType));
      if (maxFailures === 0) return "equilibrado";

      const priority = ["Debilidad", "Amenaza", "Fortaleza", "Oportunidad"];
      const weakestType = priority.find(type => failuresByType[type] === maxFailures);

      return {
        Debilidad: "refuerzo_debilidades",
        Amenaza: "refuerzo_amenazas",
        Fortaleza: "potenciar_fortalezas",
        Oportunidad: "aprovechar_oportunidades"
      }[weakestType];
    }

    function showResult() {
      app.classList.add("hidden");
      result.classList.remove("hidden");

      const key = chooseSummaryVideoKey();
      renderVideo("#summaryVideoContainer", SUMMARY_VIDEOS[key]);

      const failed = answers.filter(answer => !answer.correcta).length;
      document.querySelector("#resultText").textContent = failed
        ? `Has completado la reflexión. El resumen se ha seleccionado a partir de los apartados que requieren más atención.`
        : "Has completado la reflexión con un resultado equilibrado.";

      document.querySelector("#answersList").innerHTML = answers.map(answer => `
        <article class="answer-item">
          <strong>${answer.tipo}</strong>
          <p><b>Pregunta:</b> ${escapeHtml(answer.pregunta)}</p>
          <p><b>Respuesta:</b> ${escapeHtml(answer.respuestaUsuario)}</p>
          <p><b>Recomendación:</b> ${escapeHtml(answer.feedback)}</p>
        </article>
      `).join("");
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>'"]/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "'": "&#39;",
        '"': "&quot;"
      }[char]));
    }

    function generatePdf() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const margin = 15;
      const pageWidth = doc.internal.pageSize.getWidth();
      const pageHeight = doc.internal.pageSize.getHeight();
      const usableWidth = pageWidth - margin * 2;
      let y = 18;

      doc.setFont("helvetica", "bold");
      doc.setFontSize(18);
      doc.text("Informe de reflexión DAFO", margin, y);
      y += 10;

      doc.setFont("helvetica", "normal");
      doc.setFontSize(11);
      addWrappedText(doc, "Este documento recoge tus respuestas y recomendaciones personalizadas para profundizar en Debilidades, Amenazas, Fortalezas y Oportunidades.", margin, y, usableWidth);
      y += 20;

      SECTION_ORDER.forEach(type => {
        y = ensureSpace(doc, y, 30, pageHeight, margin);
        doc.setFont("helvetica", "bold");
        doc.setFontSize(14);
        doc.text(type, margin, y);
        y += 8;

        answers.filter(answer => answer.tipo === type).forEach((answer, index) => {
          y = ensureSpace(doc, y, 48, pageHeight, margin);
          doc.setFont("helvetica", "bold");
          doc.setFontSize(11);
          y = addWrappedText(doc, `${index + 1}. ${answer.pregunta}`, margin, y, usableWidth);

          doc.setFont("helvetica", "normal");
          y = addWrappedText(doc, `Tu respuesta: ${answer.respuestaUsuario}`, margin, y + 2, usableWidth);
          y = addWrappedText(doc, `Recomendación: ${answer.feedback}`, margin, y + 2, usableWidth);
          y += 6;
        });
      });

      doc.save("informe-dafo.pdf");
    }

    function addWrappedText(doc, text, x, y, width) {
      const lines = doc.splitTextToSize(text, width);
      doc.text(lines, x, y);
      return y + lines.length * 6;
    }

    function ensureSpace(doc, y, needed, pageHeight, margin) {
      if (y + needed > pageHeight - margin) {
        doc.addPage();
        return margin;
      }
      return y;
    }
  </script>
</body>
</html>
